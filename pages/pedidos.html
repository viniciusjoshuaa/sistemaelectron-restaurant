<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pedidos</title>
<link rel="stylesheet" href="../assets/style.css">
<script src="../assets/theme.js"></script>
</head>
<body>

<button class="btn-voltar" onclick="window.location.href='../index.html'">←</button>

<h2 class="titulo-pagina">📋 Todos os Pedidos</h2>

<div class="container-central">
  <div style="margin-bottom: 20px;">
    <button class="btn-verde" onclick="carregarPedidos('todos')">Todos</button>
    <button class="btn-verde" onclick="carregarPedidos('hoje')">Hoje</button>
  </div>
  
  <div id="listaPedidos" class="lista"></div>
</div>

<script>
let modoAtual = 'hoje'

async function carregarPedidos(modo) {
  modoAtual = modo
  let pedidos
  
  if (modo === 'hoje') {
    pedidos = await window.api.getPedidosHoje()
  } else {
    pedidos = await window.api.getPedidos()
  }
  
  const lista = document.getElementById('listaPedidos')
  lista.innerHTML = ''
  
  if (pedidos.length === 0) {
    lista.innerHTML = '<p style="text-align: center; color: #666;">Nenhum pedido encontrado.</p>'
    return
  }
  
  pedidos.reverse().forEach(p => {
    lista.innerHTML += `
      <div class="area-oficial" style="margin-bottom:15px;">
        <div style="display: flex; justify-content: space-between;">
          <div>
            <strong>${p.data} - ${p.hora}</strong>
          </div>
          <span class="status-badge badge-${p.status}">${p.status}</span>
        </div>
        <br>
        ${p.itens.map(i => `• ${i}`).join('<br>')}
        ${p.observacao ? '<br><small>Obs: ' + p.observacao + '</small>' : ''}
      </div>
    `
  })
}

// Adicionar estilos para status badges
const style = document.createElement('style')
style.textContent = `
  .status-badge {
    padding: 3px 8px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: bold;
  }
  .badge-pendente { background: #f39c12; color: white; }
  .badge-preparando { background: #3498db; color: white; }
  .badge-pronto { background: #2ecc71; color: white; }
  .badge-entregue { background: #95a5a6; color: white; }
  .badge-cancelado { background: #e74c3c; color: white; }
`
document.head.appendChild(style)

carregarPedidos('hoje')
</script>

</body>
</html>
